name: Claude Code Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  claude-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install claude-ai

      - name: Run Claude code check
        run: |
          python -c "from claude_ai import Claude; print('Claude package installed', Claude)"

  claude-code-review:
    runs-on: ubuntu-latest
    needs: claude-code
    if: ${{ secrets.CLAUDE_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Claude review dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic

      - name: Run Claude code review
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          python - <<'PY'
          import glob
          import os
          from pathlib import Path
          import textwrap
          import anthropic

          api_key = os.environ.get('CLAUDE_API_KEY')
          if not api_key:
              raise SystemExit('Missing CLAUDE_API_KEY secret')

          client = anthropic.Client(api_key=api_key)
          files = []
          for path in sorted(glob.glob('**/*.py', recursive=True)):
              if path.startswith('.github/') or path.startswith('.git/'):
                  continue
              files.append(f'### {path}\n' + Path(path).read_text(encoding='utf-8'))

          if not files:
              print('No Python files found for review.')
              raise SystemExit(0)

          prompt = textwrap.dedent('''
          Review the following repository Python files for correctness, style, security, and maintainability.
          Provide a short summary of issues, suggestions, and any recommended changes.

          ''' + '\n\n'.join(files))

          response = client.completions.create(
              model='claude-3.5',
              prompt=anthropic.HUMAN_PROMPT + prompt + anthropic.AI_PROMPT,
              max_tokens_to_sample=1000,
              stop_sequences=[anthropic.HUMAN_PROMPT],
          )

          print(response.completion)
          PY
